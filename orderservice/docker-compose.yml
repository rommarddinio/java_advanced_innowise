services:

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - JWT_SECRET=mySecret
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:postgresql://postgres:5432/orderDB
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
    ports:
      - "8082:8082"
    depends_on:
      - postgres

  postgres:
    image: postgres
    environment:
      POSTGRES_DB: orderDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"