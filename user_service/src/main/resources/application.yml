spring:
 profiles:
  active: local

---
spring:
 config:
  activate:
   on-profile: local
 liquibase:
  enabled: true
 datasource:
  url: ${DB_URL}
  username: ${DB_USERNAME}
  password: ${DB_PASSWORD}
  driver-class-name: org.postgresql.Driver
 jpa:
  properties:
   hibernate:
    dialect: org.hibernate.dialect.PostgreSQLDialect
    show_sql: true
 data:
  redis:
   host: ${SPRING_REDIS_HOST}
   port: ${SPRING_REDIS_PORT}

---
spring:
 config:
  activate:
   on-profile: docker
 liquibase:
  enabled: true
 datasource:
  url: ${DB_URL}
  username: ${DB_USERNAME}
  password: ${DB_PASSWORD}
  driver-class-name: org.postgresql.Driver
 jpa:
  properties:
   hibernate:
    dialect: org.hibernate.dialect.PostgreSQLDialect
    show_sql: true
 data:
  redis:
   host: ${SPRING_REDIS_HOST}
   port: ${SPRING_REDIS_PORT}