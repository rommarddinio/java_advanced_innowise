databaseChangeLog:
  - changeSet:
      id: create-payment-cards-table
      author: Roman
      changes:
        - createTable:
            tableName: payment_cards
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_payment_cards_user_id
                    references: users(id)
              - column:
                  name: number
                  type: varchar(20)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: holder
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: expiration_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  defaultValueBoolean: true